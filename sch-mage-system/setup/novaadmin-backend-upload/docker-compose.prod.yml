version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novaadmin_api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY to a strong random value}
      - DATABASE_URL=mysql+pymysql://${DB_USER:?Set DB_USER}:${DB_PASSWORD:?Set DB_PASSWORD}@mariadb:3306/${DB_NAME:-novaadmin_db}?charset=utf8mb4
      - REDIS_URL=redis://redis:6379/0
      - DB_AUTO_CREATE=${DB_AUTO_CREATE:-False}
      - SEED_DEMO_DATA=${SEED_DEMO_DATA:-False}
      - CORS_ORIGINS=${CORS_ORIGINS:?Set CORS_ORIGINS to your frontend origin}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-True}
      - API_TITLE=${API_TITLE:-NovaAdmin API}
      - API_VERSION=${API_VERSION:-1.0.0}
      - API_DESCRIPTION=${API_DESCRIPTION:-School Management System API}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - novaadmin
    restart: unless-stopped

  mariadb:
    image: mariadb:11.4
    container_name: novaadmin_mariadb
    environment:
      MARIADB_USER: ${DB_USER:?Set DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-novaadmin_db}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - novaadmin
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: novaadmin_redis
    volumes:
      - redis_data:/data
    networks:
      - novaadmin
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  novaadmin:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
