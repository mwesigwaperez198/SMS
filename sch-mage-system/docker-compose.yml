version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novaadmin_api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_URL=mysql+pymysql://${DB_USER:-novaadmin}:${DB_PASSWORD:-novaadmin123}@mariadb:3306/${DB_NAME:-novaadmin_db}?charset=utf8mb4
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
      - DB_AUTO_CREATE=True
      - SEED_DEMO_DATA=True
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
      - CORS_ALLOW_CREDENTIALS=True
    volumes:
      - ./:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - novaadmin
    restart: unless-stopped

  mariadb:
    image: mariadb:11.4
    container_name: novaadmin_mariadb
    environment:
      MARIADB_USER: ${DB_USER:-novaadmin}
      MARIADB_PASSWORD: ${DB_PASSWORD:-novaadmin123}
      MARIADB_DATABASE: ${DB_NAME:-novaadmin_db}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_novaadmin123}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - novaadmin
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: novaadmin_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - novaadmin
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: novaadmin_adminer
    ports:
      - "8080:8080"
    networks:
      - novaadmin
    restart: unless-stopped
    depends_on:
      - mariadb

networks:
  novaadmin:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
