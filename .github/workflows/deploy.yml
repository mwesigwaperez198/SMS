name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        working-directory: smart_school_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || pip install fastapi uvicorn sqlalchemy pydantic pydantic-settings python-jose passlib[bcrypt] psycopg2-binary email-validator
      - name: Check imports
        working-directory: smart_school_backend
        run: python -c "from app.main import create_app; print('Backend imports OK')"
      - name: Trigger Render deploy
        if: success()
        run: |
          curl -X POST "https://api.render.com/deploy/srv-d97185u7r5hc738lb5pg?key=${{ secrets.RENDER_DEPLOY_KEY }}" \
            -H "Accept: application/json" \
            --fail --silent --show-error
